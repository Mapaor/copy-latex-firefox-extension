<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Copy LaTeX Customization</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h3>LaTeX or Typst?</h3>
  <div class="toggle-container">
    <span class="format-label">LaTeX</span>
    <label class="toggle-switch">
      <input type="checkbox" id="formatToggle">
      <span class="slider"></span>
    </label>
    <span class="format-label">Typst</span>
  </div>
  <div class="config-container">
    <button id="configBtn" title="Settings" class="icon-btn" aria-label="Settings">
      <!-- Catppuccin Icon. Source: https://allsvgicons.com/pack/catppuccin/#config -->
      <svg xmlns="http://www.w3.org/2000/svg" width="1.5em" height="1.5em" viewBox="0 0 16 16" stroke="var(--icon-stroke)"><title>config</title><path fill="none" stroke="var(--icon-stroke)" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.711" d="M7.997 9.694a1.726 1.695 0 1 0 0-3.39a1.726 1.695 0 0 0 0 3.39m3.021-6.78l3.021 5.085l-3.021 5.085H4.976L1.955 7.999l3.021-5.085z"/></svg>
    </button>
    <div id="settingsPanel" class="settings-panel" style="display:none;">
      <section class="settings-section settings-first-section" aria-label="Theme settings">
        <h4>Theme</h4>
        <div class="theme-radio-group" role="radiogroup" aria-label="Theme">
          <label class="theme-radio">
            <input type="radio" name="themeMode" value="light">
            Light
          </label>
          <label class="theme-radio">
            <input type="radio" name="themeMode" value="dark">
            Dark
          </label>
          <label class="theme-radio">
            <input type="radio" name="themeMode" value="system">
            System
          </label>
        </div>
      </section>

      <section class="settings-section" aria-label="Context menu settings">
        <h4>Context Menu</h4>
        <label class="settings-checkbox">
          <input type="checkbox" id="contextMenuOption">
          Show context menu option
        </label>
      </section>

      <section class="settings-section" aria-label="Delimiter settings">
        <h4>Delimiters</h4>
        <div class="two-column-container">
          <div class="column">
            <h5>Inline</h5>
            <label class="field">
              <!-- <span class="field-label">Wrapper</span> -->
              <select id="inlineDelimiterSelect" class="select" aria-label="Inline delimiter wrapper">
                <option value="none">None</option>
                <option value="$">$ … $</option>
                <option value="\\(">\( … \)</option>
              </select>
            </label>
          </div>
          <div class="column">
            <h5>Display</h5>
            <label class="field">
              <!-- <span class="field-label">Wrapper</span> -->
              <select id="displayDelimiterSelect" class="select" aria-label="Display delimiter wrapper">
                <option value="none">None</option>
                <option value="$$">$$ … $$</option>
                <option value="\\[">\[ … \]</option>
              </select>
            </label>
          </div>
        </div>
        <a href="#" id="addDelimiterLink" class="text-link">Add new custom delimiter</a>
      </section>
      <section>
        <h4>Language</h4>
        <button id="manageTranslationsBtn">
          <!-- Hugeicons icon 'translation'-->
          <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><title xmlns="">translation</title><g fill="none" stroke="#0017ff" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5.966h3.15m3.85 0h-1.75m-2.1 0h2.1m-2.1 0V5m2.1.966c-.37 1.32-1.142 2.568-2.025 3.665M5.975 12c.713-.656 1.52-1.46 2.25-2.369m0 0c-.45-.528-1.08-1.381-1.26-1.767m1.26 1.767l1.35 1.403"/><path d="M7.022 16.978c.055 1.72.242 2.775.886 3.56a4 4 0 0 0 .554.554C9.57 22 11.212 22 14.5 22s4.931 0 6.038-.908q.304-.25.554-.554C22 19.43 22 17.788 22 14.5c0-3.287 0-4.931-.908-6.038a4 4 0 0 0-.554-.554c-.782-.641-1.831-.83-3.538-.885m-9.978 9.955c-1.72-.055-2.775-.242-3.56-.886a4 4 0 0 1-.554-.554C2 14.43 2 12.788 2 9.5c0-3.287 0-4.931.908-6.038a4 4 0 0 1 .554-.554C4.57 2 6.212 2 9.5 2c3.287 0 4.931 0 6.038.908a4 4 0 0 1 .554.554c.644.785.831 1.84.886 3.56l.022.001m-9.978 9.955L17 7.023"/><path stroke-linecap="round" stroke-linejoin="round" d="m13 19l.833-2M18 19l-.833-2m-3.334 0l1.667-4l1.667 4m-3.334 0h3.334"/></g></svg>
          Set Custom Translation
        </button>
      </section>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
